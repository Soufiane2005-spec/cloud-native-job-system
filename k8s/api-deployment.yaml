apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: cloud-job-system-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: PORT

            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_PORT

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-job-secret
                  key: DATABASE_URL