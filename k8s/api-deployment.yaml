apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cloud-job-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: cloud-job-system-api:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: PORT

            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_PORT

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-job-secret
                  key: DATABASE_URL