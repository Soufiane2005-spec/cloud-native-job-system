apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: cloud-job-system-worker:latest
          imagePullPolicy: Never
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_PORT

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-job-secret
                  key: DATABASE_URL