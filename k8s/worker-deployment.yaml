apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cloud-job-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: cloud-job-system-worker:latest
          imagePullPolicy: Never

          livenessProbe:
            exec:
              command:
                - pgrep
                - node
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            exec:
              command:
                - pgrep
                - node
            initialDelaySeconds: 5
            periodSeconds: 5

          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-job-config
                  key: REDIS_PORT

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-job-secret
                  key: DATABASE_URL